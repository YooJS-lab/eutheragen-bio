<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eutheragen Bio | Publications</title>
  <meta name="theme-color" content="#0b1d36" />
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo.png" />

<body>
  <div class="site-bg" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid"></div>

  <header class="topbar">
    <div class="container nav-shell">
      <a href="index.html" class="brand" aria-label="Eutheragen Bio home">

      <div class="section-head centered">
        <div class="eyebrow">Publications</div>
        <h1>Research publications</h1>

        <div class="publication-frame-wrap">
